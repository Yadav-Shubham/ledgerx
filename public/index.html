    </style>
</head>
<body>
    <!-- Authentication Section -->
    <div id="auth-section" class="auth-container">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 30px; color: #333;">LedgerX</h2>
            <div id="auth-tabs" class="tab-buttons">
                <button class="tab-btn active" onclick="showAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="showAuthTab('register')">Register</button>
            </div>

            <div id="login-form">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Login</button>
                </form>
            </div>

            <div id="register-form" class="hidden">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-fullname">Full Name</label>
                        <input type="text" id="reg-fullname">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Register</button>
                </form>
            </div>

            <div id="auth-message"></div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="main-app" class="main-app">
        <div class="container">
            <div class="header">
                <h1>LedgerX</h1>
                <div>
                    <span id="user-info"></span>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="balance-card">
                <h3>Current Balance</h3>
                <div id="balance-amount" class="balance-amount">$0.00</div>
            </div>

            <div class="summary-grid">
                <div class="summary-card">
                    <h4>Total Credits</h4>
                    <div id="total-credits" style="font-size: 1.5em; color: #4CAF50; font-weight: bold;">$0.00</div>
                </div>
                <div class="summary-card">
                    <h4>Total Debits</h4>
                    <div id="total-debits" style="font-size: 1.5em; color: #f44336; font-weight: bold;">$0.00</div>
                </div>
                <div class="summary-card">
                    <h4>Transactions</h4>
                    <div id="total-transactions" style="font-size: 1.5em; font-weight: bold;">0</div>
                </div>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
                <button class="tab-btn" onclick="showTab('transactions')">Transactions</button>
                <button class="tab-btn" onclick="showTab('add-transaction')">Add Transaction</button>
            </div>

            <div id="dashboard-tab">
                <div class="summary-card">
                    <h4>Recent Transactions</h4>
                    <div id="recent-transactions" class="transaction-list">
                        <div class="loading">Loading recent transactions...</div>
                    </div>
                </div>
            </div>

            <div id="transactions-tab" class="hidden">
                <div class="filters">
                    <select id="filter-type">
                        <option value="">All Types</option>
                        <option value="credit">Credits</option>
                        <option value="debit">Debits</option>
                    </select>
                    <select id="filter-category">
                        <option value="">All Categories</option>
                    </select>
                    <input type="text" id="filter-search" placeholder="Search transactions...">
                    <input type="date" id="filter-from-date">
                    <input type="date" id="filter-to-date">
                    <button class="btn btn-primary" onclick="loadTransactions()">Filter</button>
                </div>
                <div id="transactions-list" class="transaction-list">
                    <div class="loading">Loading transactions...</div>
                </div>
            </div>

            <div id="add-transaction-tab" class="hidden">
                <div class="transaction-form">
                    <h4>Add New Transaction</h4>
                    <form onsubmit="handleAddTransaction(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="txn-type">Type</label>
                                <select id="txn-type" required onchange="updateCategories()">
                                    <option value="">Select Type</option>
                                    <option value="credit">Credit (+)</option>
                                    <option value="debit">Debit (-)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="txn-amount">Amount</label>
                                <input type="number" id="txn-amount" step="0.01" min="0.01" required>
                            </div>
                            <div class="form-group">
                                <label for="txn-category">Category</label>
                                <select id="txn-category">
                                    <option value="">Select Category</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="txn-date">Date</label>
                                <input type="date" id="txn-date" required value="<?php echo date('Y-m-d'); ?>">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="txn-description">Description</label>
                            <input type="text" id="txn-description" required placeholder="Transaction description">
                        </div>
                        <div class="form-group">
                            <label for="txn-reference">Reference (Optional)</label>
                            <input type="text" id="txn-reference" placeholder="Reference number or note">
                        </div>
                        <div class="form-group">
                            <label for="txn-note">Note (Optional)</label>
                            <textarea id="txn-note" rows="3" placeholder="Additional notes"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Transaction</button>
                    </form>
                </div>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('ledger_token');
        let categories = [];

        // Initialize app
        if (token) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadAppData();
        }

        // Authentication functions
        function showAuthTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.querySelectorAll('#auth-tabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === tab);
            });
        }

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('ledger_token', token);
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    loadAppData();
                } else {
                    showMessage(data.error, 'error', 'auth-message');
                }
            } catch (error) {
                showMessage('Network error', 'error', 'auth-message');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('reg-username').value;
            const full_name = document.getElementById('reg-fullname').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, full_name })
                });

                const data = await response.json();
                if (response.ok) {
                    showMessage('Registration successful! Please login.', 'success', 'auth-message');
                    showAuthTab('login');
                } else {
                    showMessage(data.error, 'error', 'auth-message');
                }
            } catch (error) {
                showMessage('Network error', 'error', 'auth-message');
            }
        }

        function logout() {
            localStorage.removeItem('ledger_token');
            token = null;
            document.getElementById('auth-section').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
            // Clear forms
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            document.getElementById('reg-username').value = '';
            document.getElementById('reg-fullname').value = '';
            document.getElementById('reg-password').value = '';
        }

        // App functions
        async function loadAppData() {
            await loadCategories();
            await loadSummary();
            await loadRecentTransactions();
            document.getElementById('user-info').textContent = 'Welcome!';
        }

        async function loadCategories() {
            try {
                const response = await fetch('/api/categories', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                categories = await response.json();
                updateCategorySelects();
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        function updateCategorySelects() {
            const selects = ['txn-category', 'filter-category'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                select.innerHTML = '<option value="">Select Category</option>';
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = `${cat.icon} ${cat.name}`;
                    select.appendChild(option);
                });
            });
        }

        function updateCategories() {
            const type = document.getElementById('txn-type').value;
            const select = document.getElementById('txn-category');
            select.innerHTML = '<option value="">Select Category</option>';
            categories.filter(cat => cat.type === type || cat.type === 'both').forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = `${cat.icon} ${cat.name}`;
                select.appendChild(option);
            });
        }

        async function loadSummary() {
            try {
                const response = await fetch('/api/summary', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                document.getElementById('balance-amount').textContent = `$${data.balance.toFixed(2)}`;
                document.getElementById('balance-amount').classList.toggle('negative', data.balance < 0);
                document.getElementById('total-credits').textContent = `$${data.total_credit.toFixed(2)}`;
                document.getElementById('total-debits').textContent = `$${data.total_debit.toFixed(2)}`;
                document.getElementById('total-transactions').textContent = data.total_transactions;
            } catch (error) {
                console.error('Error loading summary:', error);
            }
        }

        async function loadRecentTransactions() {
            try {
                const response = await fetch('/api/transactions?limit=5', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                renderTransactions(data.transactions, 'recent-transactions');
            } catch (error) {
                console.error('Error loading recent transactions:', error);
            }
        }

        async function loadTransactions() {
            const type = document.getElementById('filter-type').value;
            const category_id = document.getElementById('filter-category').value;
            const search = document.getElementById('filter-search').value;
            const from_date = document.getElementById('filter-from-date').value;
            const to_date = document.getElementById('filter-to-date').value;

            const params = new URLSearchParams();
            if (type) params.append('type', type);
            if (category_id) params.append('category_id', category_id);
            if (search) params.append('search', search);
            if (from_date) params.append('from_date', from_date);
            if (to_date) params.append('to_date', to_date);

            try {
                const response = await fetch(`/api/transactions?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                renderTransactions(data.transactions, 'transactions-list');
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

        function renderTransactions(transactions, containerId) {
            const container = document.getElementById(containerId);
            if (transactions.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">No transactions found</div>';
                return;
            }

            container.innerHTML = transactions.map(txn => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span>${txn.category_icon || '📌'}</span>
                            <strong>${txn.description}</strong>
                        </div>
                        <div class="transaction-meta">
                            ${txn.category_name || 'Uncategorized'} • ${new Date(txn.date).toLocaleDateString()}
                            ${txn.reference ? ` • Ref: ${txn.reference}` : ''}
                        </div>
                        ${txn.note ? `<div style="color: #666; font-size: 0.9em; margin-top: 5px;">${txn.note}</div>` : ''}
                    </div>
                    <div class="transaction-amount ${txn.type}">
                        ${txn.type === 'credit' ? '+' : '-'}$${txn.amount.toFixed(2)}
                    </div>
                </div>
            `).join('');
        }

        async function handleAddTransaction(event) {
            event.preventDefault();

            const formData = {
                type: document.getElementById('txn-type').value,
                amount: parseFloat(document.getElementById('txn-amount').value),
                description: document.getElementById('txn-description').value,
                category_id: document.getElementById('txn-category').value || null,
                reference: document.getElementById('txn-reference').value || null,
                note: document.getElementById('txn-note').value || null,
                date: document.getElementById('txn-date').value
            };

            try {
                const response = await fetch('/api/transactions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (response.ok) {
                    showMessage('Transaction added successfully!', 'success');
                    event.target.reset();
                    document.getElementById('txn-date').value = new Date().toISOString().split('T')[0];
                    loadAppData();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Network error', 'error');
            }
        }

        function showTab(tab) {
            const tabs = ['dashboard', 'transactions', 'add-transaction'];
            tabs.forEach(t => {
                document.getElementById(`${t}-tab`).classList.toggle('hidden', t !== tab);
            });
            document.querySelectorAll('.tab-buttons .tab-btn').forEach((btn, index) => {
                btn.classList.toggle('active', tabs[index] === tab);
            });

            if (tab === 'transactions') {
                loadTransactions();
            }
        }

        function showMessage(message, type, containerId = 'message') {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // Set default date
        document.getElementById('txn-date').value = new Date().toISOString().split('T')[0];
    </script>
</body>
